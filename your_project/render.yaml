services:
  - type: web
    name: fset-booking
    env: python
    region: singapore          # closest to Chittagong / South Asia
    plan: free                 # upgrade to starter ($7/mo) for always-on
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn app:app -c gunicorn.conf.py
    envVars:
      - key: PYTHON_VERSION
        value: "3.11.0"
      - key: FLASK_ENV
        value: production
    healthCheckPath: /api/rooms