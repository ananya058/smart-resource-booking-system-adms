<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Smart Resource Booking System</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css">
</head>
<body>

<div class="container mt-5">
    <h2 class="text-center mb-4">Smart Resource Booking & Scheduling System</h2>

    <form id="bookingForm" class="card p-4">
        <div class="mb-3">
            <label>Resource Name</label>
            <input type="text" class="form-control" id="resource" required>
        </div>

        <div class="mb-3">
            <label>User Name</label>
            <input type="text" class="form-control" id="user" required>
        </div>

        <div class="mb-3">
            <label>Start Time</label>
            <input type="datetime-local" class="form-control" id="startTime" required>
        </div>

        <div class="mb-3">
            <label>End Time</label>
            <input type="datetime-local" class="form-control" id="endTime" required>
        </div>

        <button type="submit" class="btn btn-primary">Book Resource</button>
    </form>

    <h4 class="mt-5">Booking Records</h4>
    <table class="table table-bordered mt-3">
        <thead>
            <tr>
                <th>Resource</th>
                <th>User</th>
                <th>Start Time</th>
                <th>End Time</th>
            </tr>
        </thead>
        <tbody id="bookingTable"></tbody>
    </table>
</div>

<script src="script.js"></script>
</body>
</html>
